syntax = "proto3";

package byteaccounting.v1;

message UserOpenApp {
  string session_id = 1;
  string device_class = 2;
}

message BootstrapRequest {
  string session_id = 1;
  string protocol_version = 2;
}

message CatalogQuery {
  string session_id = 1;
  string query_name = 2;
}

message CatalogRows {
  string session_id = 1;
  uint32 row_count = 2;
}

message BootstrapResponse {
  string session_id = 1;
  string cache_tag = 2;
}

message UserAbandon {
  string session_id = 1;
  string reason = 2;
}

message UserLoginSubmit {
  string session_id = 1;
  string username = 2;
}

message LoginRequest {
  string session_id = 1;
  string username = 2;
}

message AuthCheckRequest {
  string session_id = 1;
  string username = 2;
}

message AuthCheckOK {
  string session_id = 1;
  string subject_id = 2;
}

message AuthCheckDenied {
  string session_id = 1;
  string reason = 2;
}

message ProfileQuery {
  string subject_id = 1;
}

message ProfileRows {
  string subject_id = 1;
  uint32 preference_count = 2;
}

message LoginOK {
  string session_id = 1;
  string subject_id = 2;
}

message LoginDenied {
  string session_id = 1;
  string reason = 2;
}

message UserBrowseProducts {
  string session_id = 1;
  string search_text = 2;
}

message ProductSearchRequest {
  string session_id = 1;
  string search_text = 2;
}

message ProductQuery {
  string session_id = 1;
  string search_text = 2;
}

message ProductRows {
  string session_id = 1;
  uint32 product_count = 2;
}

message ProductSearchResponse {
  string session_id = 1;
  uint32 product_count = 2;
}

message UserCheckoutClick {
  string session_id = 1;
  string cart_id = 2;
}

message CreateOrderRequest {
  string session_id = 1;
  string cart_id = 2;
}

message InventoryReserve {
  string session_id = 1;
  string cart_id = 2;
}

message InventoryReserved {
  string session_id = 1;
  string reservation_id = 2;
}

message InventoryRejected {
  string session_id = 1;
  string reason = 2;
}

message CreateOrderResponse {
  string session_id = 1;
  string order_id = 2;
}

message CheckoutRejected {
  string session_id = 1;
  string reason = 2;
}

message UserLogout {
  string session_id = 1;
}

message LogoutRequest {
  string session_id = 1;
}

message LogoutResponse {
  string session_id = 1;
}
