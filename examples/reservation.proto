syntax = "proto3";

package reservation.v2;

message CreateReservation {
  string protocol_version = 1;
  string reservation_id = 2;
  string customer_id = 3;
  string resource_id = 4;
}

message HoldRequest {
  string protocol_version = 1;
  string reservation_id = 2;
  string resource_id = 3;
}

message HoldGranted {
  string protocol_version = 1;
  string reservation_id = 2;
  string hold_id = 3;
}

message HoldRefused {
  string protocol_version = 1;
  string reservation_id = 2;
  string reason = 3;
}

message ConfirmReservation {
  string protocol_version = 1;
  string reservation_id = 2;
  string hold_id = 3;
}

message CancelReservation {
  string protocol_version = 1;
  string reservation_id = 2;
  string reason = 3;
}

message ReservationConfirmed {
  string protocol_version = 1;
  string reservation_id = 2;
  string confirmation_id = 3;
}

message ReservationCancelled {
  string protocol_version = 1;
  string reservation_id = 2;
  string reason = 3;
}

message ReservationExpired {
  string protocol_version = 1;
  string reservation_id = 2;
  string reason = 3;
}
